global:
  userPlaneArchitecture: ulcl

free5gc-smf:
 smf:
  configuration:
    configuration: |-
      smfName: SMF
      serviceNameList:
        - nsmf-pdusession
        - nsmf-event-exposure
        - nsmf-oam
      snssaiInfos:
        - sNssai:
            sst: 1
            sd: 010203
          dnnInfos:
            - dnn: internet
              dns:
                ipv4: 8.8.8.8
                ipv6: 2001:4860:4860::8888
      plmnList:
        - mcc: "208"
          mnc: "93"
      userplaneInformation:
        upNodes:
          gNB1:
            type: AN
          BranchingUPF:
            type: UPF
            nodeID: 10.160.101.112
            addr: 10.160.101.112
            sNssaiUpfInfos:
              - sNssai:
                  sst: 1
                  sd: 010203
                dnnUpfInfoList:
                  - dnn: internet
            interfaces:
              - interfaceType: N3
                endpoints:
                  - 10.160.101.111
                networkInstances:
                  - internet
              - interfaceType: N9
                endpoints:
                  - 10.160.101.113
                networkInstances:
                  - internet
          AnchorUPF1:
            type: UPF
            nodeID: 10.160.101.121
            addr: 10.160.101.121
            sNssaiUpfInfos:
              - sNssai:
                  sst: 1
                  sd: 010203
                dnnUpfInfoList:
                  - dnn: internet
                    pools:
                      - cidr: 10.61.0.0/16
            interfaces:
              - interfaceType: N9
                endpoints:
                  - 10.160.101.122
                networkInstances:
                  - internet
          AnchorUPF2:
            type: UPF
            nodeID: 10.160.101.131
            addr: 10.160.101.131
            sNssaiUpfInfos:
              - sNssai:
                  sst: 1
                  sd: 010203
                dnnUpfInfoList:
                  - dnn: internet
                    pools:
                      - cidr: 10.62.0.0/16
            interfaces:
              - interfaceType: N9
                endpoints:
                  - 10.160.101.132
                networkInstances:
                  - internet
        links:
          - A: gNB1
            B: BranchingUPF
          - A: BranchingUPF
            B: AnchorUPF1
          - A: BranchingUPF
            B: AnchorUPF2
      ulcl: true
      t3591:
        enable: true
        expireTime: 16s
        maxRetryTimes: 3
      t3592:
        enable: true
        expireTime: 16s
        maxRetryTimes: 3



mongodb:
  image:
    registry: docker.io
    repository: mongo
    tag: "6.0"
  auth:
    enabled: false

  customReadinessProbe:
    exec:
      command:
        - bash
        - -ec
        - "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  customLivenessProbe:
    exec:
      command:
        - bash
        - -ec
        - "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  podSecurityContext:
    enabled: true
    fsGroup: 999
  containerSecurityContext:
    enabled: true
    runAsUser: 999
  customReadinessProbe:
    tcpSocket:
      port: 27017
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6
  customLivenessProbe:
    tcpSocket:
      port: 27017
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6


free5gc-amf:
  amf:
    image:
      name: 10.160.101.91:32000/free5gc-amf
      tag: patched
      pullPolicy: IfNotPresent
free5gc-smf:
  smf:
    image:
      name: 10.160.101.91:32000/free5gc-smf
      tag: patched
      pullPolicy: IfNotPresent
free5gc-ausf:
  ausf:
    image:
      name: 10.160.101.91:32000/free5gc-ausf
      tag: patched
      pullPolicy: IfNotPresent
